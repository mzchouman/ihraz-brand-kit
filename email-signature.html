<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IHRAZ Email Signature Editor</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&family=Cairo:wght@300;400;500;600;700;800;900&family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #050505;
            color: #F5F5F0;
            height: 100%;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            padding: 20px 30px;
            border-bottom: 1px solid #1A1A1A;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-family: 'Syne', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: #F5F5F0;
        }

        .back-link {
            color: #999999;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #10B981;
        }

        .content {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 0;
        }

        .preview-panel {
            flex: 55%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            border-right: 1px solid #1A1A1A;
            overflow-y: auto;
        }

        .controls-panel {
            flex: 45%;
            padding: 30px;
            overflow-y: auto;
            background-color: #0A0A0A;
            display: flex;
            flex-direction: column;
        }

        .signature-wrapper {
            width: 100%;
            max-width: 600px;
        }

        .signature-preview {
            background-color: #0A0A0A;
            border: 1px solid #1A1A1A;
            border-radius: 8px;
            overflow: hidden;
        }

        .signature-preview.light {
            background-color: #FFFFFF;
            border-color: #E0E0E0;
        }

        /* Control sections */
        .control-section {
            margin-bottom: 25px;
        }

        .control-section:last-of-type {
            margin-bottom: 0;
        }

        .control-label {
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            color: #999999;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            display: block;
        }

        .control-group {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            align-items: center;
        }

        .control-group.radio {
            gap: 20px;
        }

        .radio-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input[type="radio"] {
            accent-color: #10B981;
            cursor: pointer;
            width: 16px;
            height: 16px;
        }

        input[type="radio"] + label {
            font-size: 14px;
            cursor: pointer;
            color: #CCCCCC;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="url"] {
            flex: 1;
            background-color: #050505;
            border: 1px solid #1A1A1A;
            color: #F5F5F0;
            padding: 10px 12px;
            border-radius: 4px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            transition: all 0.2s;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="tel"]:focus,
        input[type="url"]:focus {
            outline: none;
            border-color: #10B981;
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2);
        }

        .control-full {
            width: 100%;
        }

        /* Action buttons */
        .actions {
            display: flex;
            gap: 10px;
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid #1A1A1A;
        }

        .btn {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #1A1A1A;
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            text-decoration: none;
        }

        .btn-primary {
            background-color: #10B981;
            color: #050505;
            border-color: #10B981;
        }

        .btn-primary:hover {
            background-color: #34D399;
            border-color: #34D399;
        }

        .btn-secondary {
            background-color: transparent;
            color: #10B981;
            border-color: #10B981;
        }

        .btn-secondary:hover {
            background-color: rgba(16, 185, 129, 0.1);
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #10B981;
            color: #050505;
            padding: 12px 20px;
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 500;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
            z-index: 1000;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        /* Scrollbars */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background-color: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background-color: #1A1A1A;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background-color: #333333;
        }

        @media (max-width: 1200px) {
            .content {
                flex-direction: column;
            }

            .preview-panel {
                flex: 50%;
                border-right: none;
                border-bottom: 1px solid #1A1A1A;
            }

            .controls-panel {
                flex: 50%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Email Signature Editor</h1>
            <a href="index.html" class="back-link">← Back to Brand Kit</a>
        </div>

        <div class="content">
            <div class="preview-panel">
                <div class="signature-wrapper">
                    <div class="signature-preview dark" id="signaturePreview"></div>
                </div>
            </div>

            <div class="controls-panel">
                <div class="control-section">
                    <label class="control-label">Theme</label>
                    <div class="control-group radio">
                        <div class="radio-wrapper">
                            <input type="radio" id="themeDark" name="theme" value="dark" checked>
                            <label for="themeDark">Dark</label>
                        </div>
                        <div class="radio-wrapper">
                            <input type="radio" id="themeLight" name="theme" value="light">
                            <label for="themeLight">Light</label>
                        </div>
                    </div>
                </div>

                <div class="control-section">
                    <label for="fullName" class="control-label">Full Name</label>
                    <input type="text" id="fullName" class="control-full" value="Mohamad-Zouheir Chouman">
                </div>

                <div class="control-section">
                    <label for="title" class="control-label">Title</label>
                    <input type="text" id="title" class="control-full" value="Founder & CEO">
                </div>

                <div class="control-section">
                    <label for="email" class="control-label">Email</label>
                    <input type="email" id="email" class="control-full" value="mz@ihraz.ai">
                </div>

                <div class="control-section">
                    <label for="phone" class="control-label">Phone</label>
                    <input type="tel" id="phone" class="control-full" value="+966 XX XXX XXXX">
                </div>

                <div class="control-section">
                    <label for="website" class="control-label">Website</label>
                    <input type="url" id="website" class="control-full" value="ihraz.ai">
                </div>

                <div class="control-section">
                    <label for="linkedin" class="control-label">LinkedIn URL (Optional)</label>
                    <input type="url" id="linkedin" class="control-full" value="linkedin.com/in/mzchouman">
                </div>

                <div class="actions">
                    <button class="btn btn-primary" id="copyBtn">Copy HTML to Clipboard</button>
                    <button class="btn btn-secondary" id="exportBtn">Export as Image</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script>
        // SVG Convergence Mark
        const CONVERGENCE_SVG = `<svg viewBox="60 80 320 280" width="48" height="42" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="a1" x1="0%" y1="100%" x2="50%" y2="0%">
                    <stop offset="0%" stop-color="#10B981" stop-opacity="0.6"/>
                    <stop offset="100%" stop-color="#34D399" stop-opacity="0.9"/>
                </linearGradient>
                <linearGradient id="a2" x1="20%" y1="100%" x2="50%" y2="0%">
                    <stop offset="0%" stop-color="#10B981" stop-opacity="0.7"/>
                    <stop offset="100%" stop-color="#6EE7B7" stop-opacity="0.95"/>
                </linearGradient>
                <linearGradient id="a3" x1="50%" y1="100%" x2="50%" y2="0%">
                    <stop offset="0%" stop-color="#059669" stop-opacity="0.75"/>
                    <stop offset="100%" stop-color="#34D399" stop-opacity="1.0"/>
                </linearGradient>
            </defs>
            <path d="M126.5,315 C101,210 177.5,150 220,130" fill="none" stroke="url(#a1)" stroke-width="7" stroke-linecap="round"/>
            <path d="M164.75,305 C143.5,230 194.5,140 220,130" fill="none" stroke="url(#a2)" stroke-width="6" stroke-linecap="round"/>
            <path d="M220,325 C215,240 223,180 220,130" fill="none" stroke="url(#a3)" stroke-width="8.5" stroke-linecap="round"/>
            <path d="M275.25,305 C296.5,230 245.5,140 220,130" fill="none" stroke="url(#a2)" stroke-width="6" stroke-linecap="round"/>
            <path d="M313.5,315 C339,210 262.5,150 220,130" fill="none" stroke="url(#a1)" stroke-width="7" stroke-linecap="round"/>
            <circle cx="220" cy="130" r="5.5" fill="#6EE7B7"/>
        </svg>`;

        // State
        let currentTheme = 'dark';

        // DOM elements
        const themeRadios = document.querySelectorAll('input[name="theme"]');
        const fullNameInput = document.getElementById('fullName');
        const titleInput = document.getElementById('title');
        const emailInput = document.getElementById('email');
        const phoneInput = document.getElementById('phone');
        const websiteInput = document.getElementById('website');
        const linkedinInput = document.getElementById('linkedin');
        const signaturePreview = document.getElementById('signaturePreview');
        const copyBtn = document.getElementById('copyBtn');
        const exportBtn = document.getElementById('exportBtn');
        const toast = document.getElementById('toast');

        // Color palette
        const colors = {
            dark: {
                bg: '#0A0A0A',
                border: '#1A1A1A',
                text: '#F5F5F0',
                textDim: '#666666',
                textMid: '#999999',
                textLight: '#CCCCCC',
                emerald: '#10B981',
                emerald400: '#34D399'
            },
            light: {
                bg: '#FFFFFF',
                border: '#E0E0E0',
                text: '#050505',
                textDim: '#999999',
                textMid: '#666666',
                textLight: '#333333',
                emerald: '#047857',
                emerald400: '#10B981'
            }
        };

        function getThemeColors() {
            return colors[currentTheme];
        }

        function generateSignatureHTML() {
            const c = getThemeColors();
            const name = fullNameInput.value || 'Name';
            const titleText = titleInput.value || 'Title';
            const email = emailInput.value || 'email@example.com';
            const phone = phoneInput.value || '+966 XX XXX XXXX';
            const website = websiteInput.value || 'ihraz.ai';
            const linkedin = linkedinInput.value.trim();

            let contactHTML = `${email} | ${phone} | ${website}`;
            if (linkedin) {
                contactHTML += ` | <a href="https://${linkedin}" style="color: ${c.emerald}; text-decoration: none;">${linkedin}</a>`;
            }

            return `
<table width="600" cellpadding="0" cellspacing="0" border="0" style="background-color: ${c.bg}; border: 1px solid ${c.border}; border-radius: 8px; font-family: 'Space Grotesk', 'Arial', sans-serif;">
    <tr>
        <td style="padding: 20px; width: 70px; vertical-align: top;">
            ${CONVERGENCE_SVG}
        </td>
        <td style="padding: 20px 20px 20px 0; vertical-align: middle; border-left: 2px solid ${c.emerald}; padding-left: 20px;">
            <table width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                    <td style="font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; color: ${c.text}; margin: 0; padding: 0; line-height: 1.2;">
                        ${name}
                    </td>
                </tr>
                <tr>
                    <td style="font-family: 'Space Grotesk', sans-serif; font-size: 11px; color: ${c.emerald}; margin: 4px 0 0 0; padding: 0; line-height: 1.2;">
                        ${titleText}
                    </td>
                </tr>
                <tr>
                    <td style="height: 8px; padding: 0;"></td>
                </tr>
                <tr>
                    <td style="border-top: 1px solid ${c.emerald}; padding-top: 8px;"></td>
                </tr>
                <tr>
                    <td style="font-family: 'Inter', sans-serif; font-size: 10px; color: ${c.textLight}; margin: 0; padding: 0; line-height: 1.4;">
                        ${contactHTML}
                    </td>
                </tr>
                <tr>
                    <td style="height: 8px; padding: 0;"></td>
                </tr>
                <tr>
                    <td style="font-family: 'Cairo', 'Space Grotesk', sans-serif; font-size: 8px; color: ${c.emerald400}; margin: 0; padding: 0; line-height: 1.2; letter-spacing: 0.5px;">
                        صُنع في السعودية · Saudi Born
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>`;
        }

        function updatePreview() {
            const c = getThemeColors();
            signaturePreview.className = `signature-preview ${currentTheme}`;
            signaturePreview.innerHTML = generateSignatureHTML();
        }

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        async function copyHTMLToClipboard() {
            try {
                const html = generateSignatureHTML();
                await navigator.clipboard.writeText(html);
                showToast('Copied to clipboard!');
            } catch (err) {
                console.error('Failed to copy:', err);
                showToast('Failed to copy');
            }
        }

        async function exportAsImage() {
            try {
                exportBtn.disabled = true;
                exportBtn.textContent = 'Exporting...';

                const element = document.querySelector('.signature-preview');
                const canvas = await html2canvas(element, {
                    backgroundColor: getThemeColors().bg,
                    scale: 2,
                    logging: false,
                    useCORS: true,
                    allowTaint: true
                });

                const link = document.createElement('a');
                link.href = canvas.toDataURL('image/png');
                link.download = `ihraz-email-signature-${currentTheme}.png`;
                link.click();

                showToast('Image exported!');
            } catch (err) {
                console.error('Export failed:', err);
                showToast('Export failed');
            } finally {
                exportBtn.disabled = false;
                exportBtn.textContent = 'Export as Image';
            }
        }

        // Event listeners
        themeRadios.forEach(radio => {
            radio.addEventListener('change', (e) => {
                currentTheme = e.target.value;
                updatePreview();
            });
        });

        [fullNameInput, titleInput, emailInput, phoneInput, websiteInput, linkedinInput].forEach(input => {
            input.addEventListener('input', updatePreview);
        });

        copyBtn.addEventListener('click', copyHTMLToClipboard);
        exportBtn.addEventListener('click', exportAsImage);

        // Initial render
        updatePreview();
    </script>
</body>
</html>
