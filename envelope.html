<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IHRAZ Envelope Editor</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&family=Cairo:wght@300;400;500;600;700;800;900&family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --black: #050505;
            --deep: #0A0A0A;
            --surface: #111111;
            --border: #1A1A1A;
            --text-dim: #666666;
            --text-mid: #999999;
            --text-light: #CCCCCC;
            --white: #F5F5F0;
            --emerald-500: #10B981;
            --emerald-400: #34D399;
            --emerald-300: #6EE7B7;
            --emerald-700: #047857;
        }

        body {
            background-color: var(--black);
            color: var(--text-light);
            font-family: 'Space Grotesk', sans-serif;
            line-height: 1.6;
            padding: 40px 20px;
        }

        .header {
            max-width: 1600px;
            margin: 0 auto 40px;
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 40px;
        }

        .header-mark {
            width: 30px;
            height: 26px;
            flex-shrink: 0;
        }

        .header-title {
            font-family: 'Syne', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--white);
        }

        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--emerald-500);
            text-decoration: none;
            font-size: 14px;
            font-family: 'Space Grotesk', sans-serif;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: var(--emerald-300);
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 65% 1fr;
            gap: 40px;
        }

        .preview-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .preview-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-mid);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .envelope-container {
            display: flex;
            justify-content: center;
            padding: 40px;
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        .envelope {
            width: 912px;
            height: 396px;
            position: relative;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        }

        .envelope.dark {
            background-color: var(--deep);
            border: 1px solid var(--border);
            color: var(--white);
        }

        .envelope.light {
            background-color: var(--white);
            border: 1px solid #EBEBEB;
            color: var(--black);
        }

        .return-address {
            position: absolute;
            top: 24px;
            left: 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .return-header {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .return-mark {
            width: 20px;
            height: 18px;
            flex-shrink: 0;
        }

        .return-brand {
            display: flex;
            align-items: baseline;
            gap: 6px;
        }

        .return-en {
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: var(--emerald-500);
        }

        .return-divider {
            color: var(--emerald-400);
            font-weight: 300;
        }

        .return-ar {
            font-family: 'Cairo', sans-serif;
            font-size: 12px;
            color: var(--emerald-400);
            font-weight: 600;
        }

        .return-separator {
            height: 1px;
            background-color: var(--emerald-500);
            width: 120px;
        }

        .return-details {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .return-line {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 8px;
            letter-spacing: 0.3px;
        }

        .return-line.box {
            color: var(--text-mid);
        }

        .envelope.dark .return-line.contact {
            color: var(--emerald-400);
        }

        .envelope.light .return-line.contact {
            color: var(--emerald-700);
        }

        .recipient-address {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            gap: 4px;
            text-align: center;
        }

        .recipient-name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .envelope.dark .recipient-name {
            color: var(--white);
        }

        .envelope.light .recipient-name {
            color: var(--black);
        }

        .recipient-line {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 10px;
            letter-spacing: 0.2px;
        }

        .envelope.dark .recipient-line {
            color: var(--text-light);
        }

        .envelope.light .recipient-line {
            color: #333333;
        }

        .footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 24px;
            align-items: center;
        }

        .footer-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .footer-text {
            font-family: 'Cairo', sans-serif;
            font-size: 7px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .envelope.dark .footer-text {
            color: var(--emerald-500);
        }

        .envelope.light .footer-text {
            color: var(--emerald-700);
        }

        .footer-right {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 7px;
            font-weight: 600;
            letter-spacing: 0.4px;
        }

        .controls-section {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .control-group {
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .control-title {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-mid);
        }

        .radio-group {
            display: flex;
            gap: 16px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .radio-option input[type="radio"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--emerald-500);
        }

        .radio-option label {
            cursor: pointer;
            font-size: 14px;
            color: var(--text-light);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-mid);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"] {
            background-color: rgba(26, 26, 26, 0.8);
            border: 1px solid var(--border);
            color: var(--text-light);
            padding: 10px 12px;
            border-radius: 6px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 13px;
            transition: border-color 0.3s ease, background-color 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--emerald-500);
            background-color: rgba(26, 26, 26, 1);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }

        input[type="text"]::placeholder {
            color: var(--text-dim);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .form-row.full {
            grid-template-columns: 1fr;
        }

        .export-btn {
            background-color: var(--emerald-500);
            color: var(--black);
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 8px;
        }

        .export-btn:hover {
            background-color: var(--emerald-400);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
        }

        .export-btn:active {
            transform: translateY(0);
        }

        @media (max-width: 1200px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .envelope {
                width: 100%;
                max-width: 600px;
                height: auto;
                aspect-ratio: 912 / 396;
            }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Back to Brand Kit</a>

    <div class="header">
        <svg class="header-mark" viewBox="60 80 320 280" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="a1" x1="0%" y1="100%" x2="50%" y2="0%"><stop offset="0%" stop-color="#10B981" stop-opacity="0.6"/><stop offset="100%" stop-color="#34D399" stop-opacity="0.9"/></linearGradient>
                <linearGradient id="a2" x1="20%" y1="100%" x2="50%" y2="0%"><stop offset="0%" stop-color="#10B981" stop-opacity="0.7"/><stop offset="100%" stop-color="#6EE7B7" stop-opacity="0.95"/></linearGradient>
                <linearGradient id="a3" x1="50%" y1="100%" x2="50%" y2="0%"><stop offset="0%" stop-color="#059669" stop-opacity="0.75"/><stop offset="100%" stop-color="#34D399" stop-opacity="1.0"/></linearGradient>
            </defs>
            <path d="M126.5,315 C101,210 177.5,150 220,130" fill="none" stroke="url(#a1)" stroke-width="7" stroke-linecap="round"/>
            <path d="M164.75,305 C143.5,230 194.5,140 220,130" fill="none" stroke="url(#a2)" stroke-width="6" stroke-linecap="round"/>
            <path d="M220,325 C215,240 223,180 220,130" fill="none" stroke="url(#a3)" stroke-width="8.5" stroke-linecap="round"/>
            <path d="M275.25,305 C296.5,230 245.5,140 220,130" fill="none" stroke="url(#a2)" stroke-width="6" stroke-linecap="round"/>
            <path d="M313.5,315 C339,210 262.5,150 220,130" fill="none" stroke="url(#a1)" stroke-width="7" stroke-linecap="round"/>
            <circle cx="220" cy="130" r="5.5" fill="#6EE7B7"/>
        </svg>
        <h1 class="header-title">Envelope Editor</h1>
    </div>

    <div class="container">
        <div class="preview-section">
            <div class="preview-title">Live Preview</div>
            <div class="envelope-container">
                <div id="envelope" class="envelope dark">
                    <!-- Return Address -->
                    <div class="return-address">
                        <div class="return-header">
                            <svg class="return-mark" viewBox="60 80 320 280" xmlns="http://www.w3.org/2000/svg">
                                <defs>
                                    <linearGradient id="m1" x1="0%" y1="100%" x2="50%" y2="0%"><stop offset="0%" stop-color="#10B981" stop-opacity="0.6"/><stop offset="100%" stop-color="#34D399" stop-opacity="0.9"/></linearGradient>
                                    <linearGradient id="m2" x1="20%" y1="100%" x2="50%" y2="0%"><stop offset="0%" stop-color="#10B981" stop-opacity="0.7"/><stop offset="100%" stop-color="#6EE7B7" stop-opacity="0.95"/></linearGradient>
                                    <linearGradient id="m3" x1="50%" y1="100%" x2="50%" y2="0%"><stop offset="0%" stop-color="#059669" stop-opacity="0.75"/><stop offset="100%" stop-color="#34D399" stop-opacity="1.0"/></linearGradient>
                                </defs>
                                <path d="M126.5,315 C101,210 177.5,150 220,130" fill="none" stroke="url(#m1)" stroke-width="7" stroke-linecap="round"/>
                                <path d="M164.75,305 C143.5,230 194.5,140 220,130" fill="none" stroke="url(#m2)" stroke-width="6" stroke-linecap="round"/>
                                <path d="M220,325 C215,240 223,180 220,130" fill="none" stroke="url(#m3)" stroke-width="8.5" stroke-linecap="round"/>
                                <path d="M275.25,305 C296.5,230 245.5,140 220,130" fill="none" stroke="url(#m2)" stroke-width="6" stroke-linecap="round"/>
                                <path d="M313.5,315 C339,210 262.5,150 220,130" fill="none" stroke="url(#m1)" stroke-width="7" stroke-linecap="round"/>
                                <circle cx="220" cy="130" r="5.5" fill="#6EE7B7"/>
                            </svg>
                            <div class="return-brand">
                                <span class="return-en">IHRAZ</span>
                                <span class="return-divider">|</span>
                                <span class="return-ar">إحراز</span>
                            </div>
                        </div>
                        <div class="return-separator"></div>
                        <div class="return-details">
                            <div class="return-line box" id="returnPoBox">P.O. Box 12345, Riyadh, Saudi Arabia</div>
                            <div class="return-line contact" id="returnContact">hello@ihraz.sa | www.ihraz.sa</div>
                        </div>
                    </div>

                    <!-- Recipient Address -->
                    <div class="recipient-address">
                        <div class="recipient-name" id="recipientName">John Doe</div>
                        <div class="recipient-line" id="recipientStreet">123 Main Street</div>
                        <div class="recipient-line" id="recipientCity">New York, NY 10001</div>
                    </div>

                    <!-- Footer -->
                    <div class="footer">
                        <div class="footer-left">
                            <span class="footer-text" id="footerLeft">صُنع في السعودية</span>
                        </div>
                        <div class="footer-right" id="footerRight">SAUDI BORN · GLOBALLY ENGINEERED</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="controls-section">
            <!-- Variant Selector -->
            <div class="control-group">
                <div class="control-title">Variant</div>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" id="variantDark" name="variant" value="dark" checked>
                        <label for="variantDark">Dark Envelope</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="variantLight" name="variant" value="light">
                        <label for="variantLight">Light Envelope</label>
                    </div>
                </div>
            </div>

            <!-- Return Address -->
            <div class="control-group">
                <div class="control-title">Return Address</div>
                <div class="form-group">
                    <label class="form-label">P.O. Box & City</label>
                    <input type="text" id="returnPoBox" placeholder="P.O. Box 12345, Riyadh, Saudi Arabia" value="P.O. Box 12345, Riyadh, Saudi Arabia">
                </div>
                <div class="form-group">
                    <label class="form-label">Email & Website</label>
                    <input type="text" id="returnEmail" placeholder="hello@ihraz.sa | www.ihraz.sa" value="hello@ihraz.sa | www.ihraz.sa">
                </div>
            </div>

            <!-- Recipient Address -->
            <div class="control-group">
                <div class="control-title">Recipient Address</div>
                <div class="form-group">
                    <label class="form-label">Name</label>
                    <input type="text" id="recipientName" placeholder="John Doe" value="John Doe">
                </div>
                <div class="form-group">
                    <label class="form-label">Street Address</label>
                    <input type="text" id="recipientStreet" placeholder="123 Main Street" value="123 Main Street">
                </div>
                <div class="form-group">
                    <label class="form-label">City, State & Zip</label>
                    <input type="text" id="recipientCity" placeholder="New York, NY 10001" value="New York, NY 10001">
                </div>
            </div>

            <!-- Export -->
            <div class="control-group">
                <div class="control-title">Export</div>
                <button class="export-btn" id="exportBtn">Export Print-Ready PDF</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
        // Get all control elements
        const variantRadios = document.querySelectorAll('input[name="variant"]');
        const returnPoBoxInput = document.querySelector('input#returnPoBox');
        const returnEmailInput = document.querySelector('input#returnEmail');
        const recipientNameInput = document.querySelector('input#recipientName');
        const recipientStreetInput = document.querySelector('input#recipientStreet');
        const recipientCityInput = document.querySelector('input#recipientCity');
        const exportBtn = document.getElementById('exportBtn');

        // Get envelope and elements to update
        const envelope = document.getElementById('envelope');
        const returnPoBoxDisplay = document.getElementById('returnPoBox');
        const returnContactDisplay = document.getElementById('returnContact');
        const recipientNameDisplay = document.getElementById('recipientName');
        const recipientStreetDisplay = document.getElementById('recipientStreet');
        const recipientCityDisplay = document.getElementById('recipientCity');

        // Update variant
        variantRadios.forEach(radio => {
            radio.addEventListener('change', (e) => {
                envelope.classList.remove('dark', 'light');
                envelope.classList.add(e.target.value);
            });
        });

        // Update return address
        returnPoBoxInput.addEventListener('input', (e) => {
            returnPoBoxDisplay.textContent = e.target.value || 'P.O. Box 12345, Riyadh, Saudi Arabia';
        });

        returnEmailInput.addEventListener('input', (e) => {
            returnContactDisplay.textContent = e.target.value || 'hello@ihraz.sa | www.ihraz.sa';
        });

        // Update recipient address
        recipientNameInput.addEventListener('input', (e) => {
            recipientNameDisplay.textContent = e.target.value || 'John Doe';
        });

        recipientStreetInput.addEventListener('input', (e) => {
            recipientStreetDisplay.textContent = e.target.value || '123 Main Street';
        });

        recipientCityInput.addEventListener('input', (e) => {
            recipientCityDisplay.textContent = e.target.value || 'New York, NY 10001';
        });

        // Pre-render Arabic/Cairo text to images so html2canvas doesn't garble RTL glyphs
        function preRenderArabicText(container) {
            // Find elements that use Cairo font (Arabic text)
            const allEls = container.querySelectorAll('*');
            allEls.forEach(el => {
                if (el.children.length > 0) return; // only leaf text nodes
                const text = el.textContent.trim();
                if (!text) return;
                // Detect Arabic characters (Unicode range 0600-06FF)
                if (!/[\u0600-\u06FF]/.test(text)) return;

                const computed = window.getComputedStyle(el);
                const fontSize = parseFloat(computed.fontSize);
                const fontWeight = computed.fontWeight;
                const fontFamily = computed.fontFamily;
                const color = computed.color;
                const letterSpacing = computed.letterSpacing;

                // Create a high-res canvas for this text
                const scale = 4;
                const measure = document.createElement('canvas');
                const mCtx = measure.getContext('2d');
                mCtx.font = `${fontWeight} ${fontSize}px ${fontFamily}`;
                const metrics = mCtx.measureText(text);
                const w = Math.ceil(metrics.width) + 10;
                const h = Math.ceil(fontSize * 1.6);

                const c = document.createElement('canvas');
                c.width = w * scale;
                c.height = h * scale;
                const ctx = c.getContext('2d');
                ctx.scale(scale, scale);
                ctx.font = `${fontWeight} ${fontSize}px ${fontFamily}`;
                ctx.fillStyle = color;
                ctx.textBaseline = 'middle';
                ctx.direction = 'rtl';
                ctx.fillText(text, w - 5, h / 2);

                const img = document.createElement('img');
                img.src = c.toDataURL('image/png');
                img.style.width = w + 'px';
                img.style.height = h + 'px';
                img.style.display = 'inline-block';
                img.style.verticalAlign = 'middle';
                el.textContent = '';
                el.appendChild(img);
            });
        }

        // Export to PDF
        exportBtn.addEventListener('click', () => {
            const element = document.getElementById('envelope');

            // Clone and position in viewport for reliable html2canvas rendering
            const wrapper = document.createElement('div');
            wrapper.style.cssText = 'position:fixed;left:0;top:0;z-index:99999;';
            const clone = element.cloneNode(true);
            clone.style.width = '912px';
            clone.style.height = '396px';

            // Fix recipient centering for html2canvas compatibility
            const recipient = clone.querySelector('.recipient-address');
            if (recipient) {
                recipient.style.position = 'absolute';
                recipient.style.transform = 'none';
                recipient.style.top = '0';
                recipient.style.left = '0';
                recipient.style.right = '0';
                recipient.style.bottom = '0';
                recipient.style.display = 'flex';
                recipient.style.flexDirection = 'column';
                recipient.style.alignItems = 'center';
                recipient.style.justifyContent = 'center';
            }

            wrapper.appendChild(clone);
            document.body.appendChild(wrapper);

            // Pre-render Arabic text as images to fix html2canvas RTL bug
            preRenderArabicText(clone);

            html2canvas(clone, {
                scale: 2,
                useCORS: true,
                width: 912,
                height: 396,
                scrollX: 0,
                scrollY: 0
            }).then(canvas => {
                document.body.removeChild(wrapper);

                const imgData = canvas.toDataURL('image/png', 1.0);
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF({ unit: 'in', format: [9.5, 4.125], orientation: 'landscape' });

                pdf.addImage(imgData, 'PNG', 0, 0, 9.5, 4.125);
                pdf.save('IHRAZ_Envelope.pdf');
            });
        });
    </script>
</body>
</html>
